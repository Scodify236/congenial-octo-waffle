<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Security & Device Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card: #151c2c;
            --card-border: #232d42;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 1.5rem; min-height: 100vh; }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .navbar h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .logout-btn {
            color: var(--text-sub);
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 0.5rem;
            border: 1px solid var(--card-border);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--card-border); color: #fff; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }
        .card-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-sub); font-size: 0.75rem; text-transform: uppercase; padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--card-border); }
        td { padding: 0.85rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }
        .app-name { font-weight: 600; color: #fff; display: block; }
        .pkg-name { font-size: 0.75rem; color: var(--text-sub); }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-blocked { background: rgba(244, 63, 94, 0.15); color: var(--danger); }

        .action-btns { display: flex; gap: 0.4rem; }
        .btn {
            padding: 0.45rem 0.85rem;
            border-radius: 0.4rem;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: #fff; }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        .screenshot-item {
            background: #0d1322;
            border-radius: 0.6rem;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }
        .screenshot-item img { width: 100%; height: auto; display: block; }
        .time-tag { font-size: 0.7rem; color: var(--text-sub); text-align: center; padding: 0.4rem; }

        .log-list { list-style: none; padding: 0; margin: 0; }
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 0.65rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
        }
        .log-time { color: var(--text-sub); font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛡️ Family Security Dashboard</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div id="deviceStatusContainer">
                <span class="status-pill" style="background: rgba(148,163,184,0.1); color: var(--text-sub);">○ Loading...</span>
            </div>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <div id="mainContainer">
        <!-- Rendered dynamically via JavaScript without page reloads -->
    </div>

    <script>
        async function fetchDashboardState() {
            try {
                const res = await fetch('/api/dashboard/state');
                if (!res.ok) {
                    if (res.status === 401) window.location.href = '/login';
                    return;
                }
                const data = await res.json();
                renderDashboard(data);
            } catch (err) {
                console.error("Error fetching state:", err);
            }
        }

        function renderDashboard(data) {
            const statusContainer = document.getElementById('deviceStatusContainer');
            const mainContainer = document.getElementById('mainContainer');

            if (data.device) {
                statusContainer.innerHTML = `<span class="status-pill">● Online: ${data.device.device_name}</span>`;
                
                // Apps Rows
                let appsHtml = '';
                if (data.running_apps && data.running_apps.length > 0) {
                    appsHtml = data.running_apps.map(app => {
                        const isBlocked = data.blocked_packages.includes(app.package_name);
                        return `
                            <tr>
                                <td>
                                    <span class="app-name">${app.app_name}</span>
                                    <span class="pkg-name">${app.package_name}</span>
                                </td>
                                <td>
                                    ${isBlocked ? '<span class="badge badge-blocked">Blocked</span>' : '<span class="badge badge-active">Active</span>'}
                                </td>
                                <td>
                                    <div class="action-btns">
                                        <button onclick="killApp('${app.package_name}')" class="btn btn-danger">End App</button>
                                        ${isBlocked ? 
                                            `<button onclick="unblockApp('${app.package_name}')" class="btn btn-success">Unblock</button>` : 
                                            `<button onclick="blockApp('${app.package_name}')" class="btn btn-primary">Block</button>`
                                        }
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    appsHtml = `<tr><td colspan="3" style="text-align: center; color: var(--text-sub); padding: 2rem;">No active application telemetry received yet.</td></tr>`;
                }

                // Screenshots
                let screenshotsHtml = '';
                if (data.screenshots && data.screenshots.length > 0) {
                    screenshotsHtml = data.screenshots.map(s => `
                        <div class="screenshot-item">
                            <img src="data:image/jpeg;base64,${s.image_base64}" alt="Screen">
                            <div class="time-tag">${s.captured_at}</div>
                        </div>
                    `).join('');
                } else {
                    screenshotsHtml = `<div style="grid-column: 1 / -1; color: var(--text-sub); text-align: center; padding: 2rem;">No screenshots captured. Click Capture Screen above.</div>`;
                }

                // Logs
                let logsHtml = '';
                if (data.logs && data.logs.length > 0) {
                    logsHtml = data.logs.map(l => `
                        <li class="log-item">
                            <span>${l.event}</span>
                            <span class="log-time">${l.created_at}</span>
                        </li>
                    `).join('');
                } else {
                    logsHtml = `<li style="color: var(--text-sub); text-align: center; padding: 1rem;">No recent activities logged.</li>`;
                }

                // Blocked / Restricted Apps list (for unblocking even if not currently running)
                let blockedHtml = '';
                if (data.blocked_packages && data.blocked_packages.length > 0) {
                    blockedHtml = data.blocked_packages.map(pkg => `
                        <tr>
                            <td>
                                <span class="app-name">${pkg}</span>
                            </td>
                            <td><span class="badge badge-blocked">Restricted</span></td>
                            <td>
                                <button onclick="unblockApp('${pkg}')" class="btn btn-success">Unblock App</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    blockedHtml = `<tr><td colspan="3" style="text-align: center; color: var(--text-sub); padding: 1rem;">No restricted applications. All apps permitted.</td></tr>`;
                }

                mainContainer.innerHTML = `
                    <div class="dashboard-grid">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">📱 Running Applications & Remote Control</h2>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Application</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${appsHtml}</tbody>
                            </table>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">🚫 Restricted Apps (Active Policies)</h2>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Package Name</th>
                                        <th>Policy Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>${blockedHtml}</tbody>
                            </table>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">📸 Live Screen Monitoring</h2>
                                <button onclick="requestScreenshot()" class="btn btn-primary">
                                    ${data.screenshot_pending ? 'Capturing...' : 'Capture Screen'}
                                </button>
                            </div>
                            <div class="screenshot-grid">${screenshotsHtml}</div>
                        </div>

                        <div class="card" style="grid-column: 1 / -1;">
                            <div class="card-header">
                                <h2 class="card-title">📋 Remote Event & Activity Logs</h2>
                            </div>
                            <ul class="log-list">${logsHtml}</ul>
                        </div>
                    </div>
                `;
            } else {
                statusContainer.innerHTML = `<span class="status-pill" style="background: rgba(148,163,184,0.1); color: var(--text-sub);">○ Waiting for device...</span>`;
                mainContainer.innerHTML = `
                    <div class="card" style="text-align: center; padding: 4rem 2rem;">
                        <h2 style="color: #fff; margin-bottom: 0.5rem;">Waiting for Child Device Connection...</h2>
                        <p style="color: var(--text-sub); margin-bottom: 1.5rem;">Configure the child Android application with this server URL and secret key.</p>
                        <div style="display: inline-block; background: #0d1322; border: 1px solid var(--card-border); padding: 1rem; border-radius: 0.5rem; font-family: monospace; color: var(--primary);">
                            Secret Auth Token: parental-secret-key-123
                        </div>
                    </div>
                `;
            }
        }

        // AJAX Action Handlers (Zero Page Reloads)
        async function killApp(packageName) {
            await fetch('/api/action/kill_app', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ package_name: packageName })
            });
            fetchDashboardState();
        }

        async function blockApp(packageName) {
            await fetch('/api/action/block_app', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ package_name: packageName })
            });
            fetchDashboardState();
        }

        async function unblockApp(packageName) {
            await fetch('/api/action/unblock_app', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ package_name: packageName })
            });
            fetchDashboardState();
        }

        async function requestScreenshot() {
            await fetch('/api/action/request_screenshot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            fetchDashboardState();
        }

        // Initial Load and 3-second Auto Poll
        fetchDashboardState();
        setInterval(fetchDashboardState, 3000);
    </script>
</body>
</html>
